<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>関大 会計専門職大学院 シラバス管理</title>
<style>
:root{--primary:#1a3a6b;--primary-light:#2a5298;--accent:#e67e22;--spring:#27ae60;--autumn:#e74c3c;--year:#8e44ad;--bg:#f4f6f9;--card:#fff;--border:#dce3ee;--text:#2c3e50;--muted:#7f8c9a;--shadow:0 2px 8px rgba(0,0,0,.08);--shadow-h:0 6px 20px rgba(0,0,0,.14)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Hiragino Kaku Gothic ProN','Meiryo',sans-serif;background:var(--bg);color:var(--text);font-size:14px}
.hdr{background:linear-gradient(135deg,var(--primary),var(--primary-light));color:#fff;padding:14px 20px;position:sticky;top:0;z-index:100;box-shadow:0 3px 12px rgba(0,0,0,.2)}
.hdr h1{font-size:1.1rem;font-weight:700}
.hdr p{font-size:.73rem;opacity:.8;margin-top:2px}
.sbar{background:#fff;border-bottom:2px solid var(--border);padding:10px 20px;display:flex;gap:14px;flex-wrap:wrap;align-items:center}
.snum{font-size:1.45rem;font-weight:700;color:var(--primary);line-height:1}
.slbl{font-size:.68rem;color:var(--muted)}
.snum.g{color:var(--spring)}.snum.o{color:var(--accent)}
.pbg{background:var(--border);border-radius:8px;height:10px;overflow:hidden;margin-top:3px;min-width:100px;flex:1}
.pfill{background:linear-gradient(90deg,var(--spring),#2ecc71);height:100%;border-radius:8px;transition:width .5s}
.farea{background:#fff;padding:10px 20px;border-bottom:1px solid var(--border);display:flex;gap:7px;flex-wrap:wrap;align-items:center}
.fbtn{border:2px solid var(--border);background:#fff;border-radius:20px;padding:4px 13px;font-size:.78rem;cursor:pointer;transition:all .2s;font-family:inherit;color:var(--muted);font-weight:500}
.fbtn.on{border-color:var(--primary);color:var(--primary);background:#eef2ff;font-weight:700}
.fbtn.sp.on{border-color:var(--spring);color:var(--spring);background:#e8f8f0}
.fbtn.au.on{border-color:var(--autumn);color:var(--autumn);background:#fdecea}
.fbtn.cm.on{border-color:var(--accent);color:var(--accent);background:#fef3e7}
.srch{flex:1;min-width:150px;border:2px solid var(--border);border-radius:20px;padding:5px 13px;font-size:.8rem;outline:none;font-family:inherit;transition:border-color .2s}
.srch:focus{border-color:var(--primary)}
.srt{border:2px solid var(--border);background:#fff;border-radius:20px;padding:5px 11px;font-size:.78rem;cursor:pointer;font-family:inherit;color:var(--text);outline:none}
.glbl{font-size:.7rem;color:var(--muted);font-weight:600}
.lst{padding:12px 16px;max-width:900px;margin:0 auto}
.crd{background:#fff;border-radius:12px;margin-bottom:10px;box-shadow:var(--shadow);border:1.5px solid var(--border);transition:all .2s;overflow:hidden}
.crd:hover{box-shadow:var(--shadow-h);transform:translateY(-1px)}
.crd.done{border-color:var(--spring);background:#f0fbf4}
.crd.hid{display:none}
.chdr{padding:10px 14px;display:flex;align-items:flex-start;gap:10px;cursor:pointer}
.chk{padding-top:2px}
.chk input[type=checkbox]{width:18px;height:18px;cursor:pointer;accent-color:var(--spring)}
.cmain{flex:1;min-width:0}
.ctrow{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.cname{font-weight:700;font-size:.9rem}
.ccode{font-size:.7rem;color:var(--muted);background:var(--bg);border-radius:4px;padding:1px 6px}
.bdg{font-size:.67rem;border-radius:10px;padding:2px 7px;font-weight:700;white-space:nowrap}
.bsp{background:#d5f5e3;color:#1e8449}.bau{background:#fde8e7;color:#c0392b}
.byr{background:#e8daef;color:#6c3483}.bot{background:#eaf0fb;color:#2980b9}
.by1{background:#fff3cd;color:#856404}.by2{background:#d1ecf1;color:#0c5460}
.bdone{background:#d5f5e3;color:#1e8449;font-size:.67rem;border-radius:8px;padding:1px 7px;font-weight:700}
.bcred{background:#e8eaf6;color:#3949ab;font-size:.68rem;border-radius:8px;padding:1px 7px;font-weight:600}
.cmeta{display:flex;gap:10px;margin-top:4px;flex-wrap:wrap}
.mitem{font-size:.72rem;color:var(--muted)}
.xpnd{padding:0 14px 14px;border-top:1px solid var(--border);display:none}
.xpnd.open{display:block}
.rvttl{font-size:.8rem;font-weight:700;color:var(--primary);margin:10px 0 8px}
.rrow{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.rlbl{font-size:.76rem;width:78px;color:var(--muted)}
.sins{display:flex;gap:3px}
.sins span{font-size:1.25rem;cursor:pointer;color:#bdc3c7;transition:color .15s;user-select:none}
.sins span:hover{transform:scale(1.15)}
.clist{max-height:150px;overflow-y:auto;margin-bottom:8px}
.citm{background:var(--bg);border-radius:8px;padding:7px 9px;margin-bottom:6px;font-size:.78rem;position:relative}
.cmta{color:var(--muted);font-size:.68rem;margin-bottom:3px;display:flex;justify-content:space-between;align-items:center}
.cdel{background:none;border:none;color:var(--muted);cursor:pointer;font-size:.85rem;padding:0 3px}
.cdel:hover{color:var(--autumn)}
.cform{display:flex;flex-direction:column;gap:6px}
.cinp{border:1.5px solid var(--border);border-radius:8px;padding:7px 10px;font-size:.8rem;resize:vertical;min-height:58px;font-family:inherit;outline:none;transition:border-color .2s}
.cinp:focus{border-color:var(--primary)}
.bsub{align-self:flex-end;background:var(--primary);color:#fff;border:none;border-radius:8px;padding:6px 15px;font-size:.78rem;cursor:pointer;font-family:inherit;font-weight:600;transition:background .2s}
.bsub:hover{background:var(--primary-light)}
.nores{text-align:center;padding:40px 20px;color:var(--muted);font-size:.88rem}
.ecmnt{color:var(--muted);font-size:.76rem;font-style:italic}
@media(max-width:600px){.sbar{padding:8px 12px;gap:8px}.snum{font-size:1.15rem}.farea{padding:8px 12px}.lst{padding:8px}.chdr{padding:8px 10px}}
</style>
</head>

    '<div class="cform">'+
    '<textarea class="cinp" id="CI'+s.code+'" placeholder="感想・アドバイスを書いてください..."></textarea>'+
    '<button class="bsub" onclick="AC(\''+s.code+'\')">投稿する</button>'+
    '</div></div></div>';
}
function IS(code){
  ['R','F'].forEach(function(pfx){
    var wrap=document.getElementById(pfx+code);
    if(!wrap)return;
    var tp=wrap.dataset.tp;
    var stars=wrap.querySelectorAll('span');
    var sd=GD(code);
    var cur=tp==='rat'?sd.rat||0:sd.dif||0;
    UDS(wrap,cur,tp);
    stars.forEach(function(s,i){
      s.onmouseover=function(){UDS(wrap,i+1,tp,true)};
      s.onmouseout=function(){var d2=GD(code);UDS(wrap,tp==='rat'?(d2.rat||0):(d2.dif||0),tp)};
      s.onclick=function(){
        var d2=GD(code);d2[tp]=i+1;SD(code,d2);
        UDS(wrap,i+1,tp);
        var lbl=document.getElementById((tp==='rat'?'RL':'FL')+code);
        if(lbl){if(tp==='rat')lbl.textContent=(i+1)+'/5';else lbl.textContent=['','易','普通','やや難','難','激難'][i+1]}
        RC();
      };
    });
  });
}
function UDS(wrap,val,tp){
  var ac=tp==='dif'?'#e74c3c':'#f1c40f';
  wrap.querySelectorAll('span').forEach(function(s,i){s.textContent=i<val?'★':'☆';s.style.color=i<val?ac:'#bdc3c7'});
}
function XP(code){
  var el=document.getElementById('X'+code);if(!el)return;
  var was=el.classList.contains('open');
  el.classList.toggle('open');
  if(!was)IS(code);
}
function TC(code){
  var d=GD(code);d.done=!d.done;SD(code,d);
  var card=document.getElementById('C'+code);
  if(card)card.classList.toggle('done',d.done);
  UPD();
  if(st.cf)RC();
}
function AC(code){
  var inp=document.getElementById('CI'+code);
  if(!inp||!inp.value.trim())return;
  var d=GD(code);if(!d.cmt)d.cmt=[];
  var now=new Date();
  var dt=now.getFullYear()+'/'+(now.getMonth()+1<10?'0':'')+(now.getMonth()+1)+'/'+(now.getDate()<10?'0':'')+now.getDate();
  d.cmt.unshift({tx:inp.value.trim(),dt:dt});
  SD(code,d);inp.value='';
  var cl=document.getElementById('CM'+code);
  if(cl)cl.innerHTML=d.cmt.map(function(c,i){return '<div class="citm"><div class="cmta"><span>'+EH(c.dt)+'</span><button class="cdel" onclick="DC(\''+code+'\','+i+')">✕</button></div><div>'+EH(c.tx)+'</div></div>'}).join('');
}
function DC(code,idx){
  if(!confirm('このコメントを削除しますか？'))return;
  var d=GD(code);d.cmt.splice(idx,1);SD(code,d);
  var cl=document.getElementById('CM'+code);
  if(cl)cl.innerHTML=d.cmt.length?d.cmt.map(function(c,i){return '<div class="citm"><div class="cmta"><span>'+EH(c.dt)+'</span><button class="cdel" onclick="DC(\''+code+'\','+i+')">✕</button></div><div>'+EH(c.tx)+'</div></div>'}).join(''):'<div class="ecmnt">口コミがまだありません</div>';
}
function UPD(){
  var tot=D.reduce(function(a,s){return a+s.credits},0);
  var dn=0,dc=0;
  D.forEach(function(s){var d=GD(s.code);if(d.done){dn++;dc+=s.credits}});
  var rem=tot-dc;
  var pct=tot?Math.round(dc/tot*100):0;
  document.getElementById('tc').textContent=tot;
  document.getElementById('cc').textContent=dc;
  document.getElementById('rc').textContent=rem;
  document.getElementById('cn').textContent=dn;
  document.getElementById('pp').textContent='履修進捗 '+pct+'%';
  document.getElementById('pf').style.width=pct+'%';
}
document.getElementById('si').addEventListener('input',function(){st.q=this.value;RC()});
RC();UPD();
</script>
</body></html>
